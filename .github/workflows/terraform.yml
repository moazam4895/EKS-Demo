name: Terraform EKS Pipeline

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.0"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  AWS_ACCOUNT_ID: "935803162418"

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      # ── Step 1: Checkout code ──────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Authenticate to AWS via OIDC ──────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-EKS-${{ github.run_id }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-duration-seconds: 3600

      # ── Step 3: Verify AWS identity ────────────────────────
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # ── Step 4: Install Terraform ──────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true    # Needed to capture plan output as text

      # ── Step 5: Initialize backend ─────────────────────────
      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=eks-demo-terraform-state-${{ env.ENVIRONMENT }}-${{ env.AWS_ACCOUNT_ID }}" \
            -backend-config="key=eks-demo/${{ env.ENVIRONMENT }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=eks-demo-terraform-locks-${{ env.ENVIRONMENT }}" \
            -backend-config="encrypt=true" \
            -reconfigure

      # ── Step 6: Validate syntax ────────────────────────────
      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── Step 7: Generate plan ──────────────────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="environments/${{ env.ENVIRONMENT }}/terraform.tfvars" \
            -out=tfplan \
            -no-color \
            -input=false
        continue-on-error: true    # Post comment even if plan fails

      # ── Step 8: Post plan as PR comment ───────────────────
      # Only runs on Pull Requests — skipped on push and manual triggers
      - name: Post Plan Output to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const planStatus    = '${{ steps.plan.outcome }}';
            const initStatus    = '${{ steps.init.outcome }}';
            const validateStatus = '${{ steps.validate.outcome }}';

            // Helper: green tick or red cross based on step result
            const icon = (s) => s === 'success' ? '✅' : '❌';

            const output = `## 🔍 Terraform Plan Report

            | Step | Status |
            |------|--------|
            | 🔧 Terraform Init     | ${icon(initStatus)} \`${initStatus}\` |
            | ✔️ Terraform Validate | ${icon(validateStatus)} \`${validateStatus}\` |
            | 📋 Terraform Plan     | ${icon(planStatus)} \`${planStatus}\` |

            <details>
            <summary>📄 Click to see Full Plan Output</summary>

            \`\`\`hcl
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            </details>

            ---
            > 👤 **Triggered by:** @${{ github.actor }}
            > 🌍 **Environment:** \`${{ env.ENVIRONMENT }}\`
            > 🔖 **Commit:** \`${{ github.sha }}\`
            > 📅 **Run ID:** \`${{ github.run_id }}\`

            > ⚠️ **Note:** Merging this PR will automatically trigger \`terraform apply\``;

            // Delete old bot plan comments to keep PR clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            for (const comment of comments) {
              if (
                comment.user.type === 'Bot' &&
                comment.body.includes('Terraform Plan Report')
              ) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

            // Post the new comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: output
            });

      # ── Step 9: Apply (only on merge to main) ─────────────
      - name: Terraform Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            tfplan

      # ── Step 10: Destroy (manual only) ────────────────────
      - name: Terraform Destroy
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var-file="environments/${{ env.ENVIRONMENT }}/terraform.tfvars" \
            -auto-approve \
            -input=false
